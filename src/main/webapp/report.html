<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>POS Report System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    background:#CDEAC0;
    font-family:Arial;
}

.navbar {
    background: linear-gradient(to right, #2e7d32, #4caf50);
}

.box{
    background:white;
    padding:25px;
    margin-top:30px;
    border-radius:15px;
}

.stat{
    background:#f1f8e9;
    padding:10px;
    border-radius:10px;
}

.btn-green{
    background:#2e7d32;
    color:white;
}

.btn-green:hover{
    background:#1b5e20;
    color:white;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow">
<div class="container-fluid">
<span class="navbar-brand fw-bold">🌿 BLOOMCART POS SYSTEM</span>
<ul class="navbar-nav ms-auto" id="navbarMenu"></ul>
</div>
</nav>

<div class="container box">

<h3 class="text-success">📊 Sales Report</h3>

<div class="row g-2">

<div class="col-md-3">
<select id="year" class="form-select">
<option value="2026">2026</option>
<option value="2025">2025</option>
</select>

<div class="mt-2">
<div class="row g-1">

<div class="col-6">
<small class="text-muted">Start</small>
<input type="date" id="startDate" class="form-control" onchange="customDateUsed()">
</div>

<div class="col-6">
<small class="text-muted">End</small>
<input type="date" id="endDate" class="form-control" onchange="customDateUsed()">
</div>

</div>
</div>
</div>

<div class="col-md-2">
<select id="month" class="form-select" onchange="monthChange()">
<option value="">All Month</option>
<option value="0">January</option>
<option value="1">February</option>
<option value="2">March</option>
<option value="3">April</option>
<option value="4">May</option>
<option value="5">June</option>
<option value="6">July</option>
<option value="7">August</option>
<option value="8">September</option>
<option value="9">October</option>
<option value="10">November</option>
<option value="11">December</option>
</select>
</div>

<div class="col-md-2">
<select id="week" class="form-select" disabled>
<option value="">All Week</option>
<option value="1">Week 1</option>
<option value="2">Week 2</option>
<option value="3">Week 3</option>
<option value="4">Week 4</option>
</select>
</div>

<div class="col-md-2 d-flex align-items-center">
<input type="checkbox" id="today" onchange="todayToggle()">
<label class="ms-2">Today</label>
</div>

<div class="col-md-3 d-flex gap-2">
<button class="btn btn-green w-100" onclick="generate()">Generate</button>
<button class="btn btn-secondary w-100" onclick="resetFilters()">Reset</button>
</div>

</div>

<div class="row mt-3" id="stats" style="display:none;">
<div class="col-md-3"><div class="stat">Orders <div id="o"></div></div></div>
<div class="col-md-3"><div class="stat">Revenue <div id="r"></div></div></div>
<div class="col-md-3"><div class="stat">Top Product <div id="t"></div></div></div>
<div class="col-md-3"><div class="stat">Qty <div id="q"></div></div></div>
</div>

<div id="tableBox" class="mt-3" style="display:none;">
<table class="table table-bordered">
<thead class="table-success">
<tr>
<th>Date</th>
<th>Order</th>
<th>Product</th>
<th>Qty</th>
<th>Total</th>
<th>Payment</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<button class="btn btn-success mt-3" onclick="downloadPDF()">
⬇ Download PDF
</button>

</div>

</div>

<script>

const role = localStorage.getItem("userRole");
const navbarMenu = document.getElementById("navbarMenu");

if (role === "owner") {
    navbarMenu.innerHTML = `
        <li class="nav-item"><a class="nav-link" href="product.html">Product</a></li>
        <li class="nav-item"><a class="nav-link" href="sale.html">Sale</a></li>
        <li class="nav-item"><a class="nav-link" href="customer.html">Customer</a></li>
        <li class="nav-item"><a class="nav-link" href="create-staff.html">Staff</a></li>
        <li class="nav-item"><a class="nav-link" href="report.html">Report</a></li>
        <li class="nav-item"><a class="nav-link text-warning" href="index.html">Logout</a></li>
    `;
}
else if (role === "staff") {
    navbarMenu.innerHTML = `
        <li class="nav-item"><a class="nav-link active" href="sale.html">Sale</a></li>
        <li class="nav-item"><a class="nav-link" href="customer.html">Customer</a></li>
        <li class="nav-item"><a class="nav-link text-warning" href="index.html">Logout</a></li>
    `;
}
else {
    window.location.href = "index.html";
}

const data = [
{date:"2026-01-05",order:"A1",items:[{n:"Monstera",q:1}],total:45,payment:"Cash"},
{date:"2026-01-12",order:"A2",items:[{n:"Soil",q:2}],total:40,payment:"Card"},
{date:"2026-02-03",order:"B1",items:[{n:"Plant",q:2}],total:80,payment:"Online"},
{date:"2026-02-14",order:"B2",items:[{n:"Fertilizer",q:1}],total:18,payment:"Cash"},
{date:"2026-03-06",order:"C1",items:[{n:"Cactus",q:2}],total:30,payment:"Card"},
{date:"2026-03-20",order:"C2",items:[{n:"Watering Can",q:1}],total:28,payment:"Cash"},
{date:"2026-04-02",order:"D1",items:[{n:"Soil",q:3}],total:60,payment:"Online"},
{date:"2026-04-18",order:"D2",items:[{n:"Plant",q:1}],total:50,payment:"Cash"}
];

let filtered=[];

function todayToggle(){

let isToday=document.getElementById("today").checked;

document.getElementById("year").disabled=isToday;
document.getElementById("month").disabled=isToday;
document.getElementById("week").disabled=isToday;
document.getElementById("startDate").disabled=isToday;
document.getElementById("endDate").disabled=isToday;

if(isToday){
document.getElementById("stats").style.display="none";
document.getElementById("tableBox").style.display="none";
}
}

function monthChange(){
document.getElementById("week").disabled =
document.getElementById("month").value === "";
}

function customDateUsed(){

let start=document.getElementById("startDate").value;
let end=document.getElementById("endDate").value;

if(start || end){
document.getElementById("month").value="";
document.getElementById("week").value="";
document.getElementById("today").checked=false;

document.getElementById("month").disabled=true;
document.getElementById("week").disabled=true;
}
else{
document.getElementById("month").disabled=false;
}
}

function generate(){

let year=parseInt(document.getElementById("year").value);
let month=document.getElementById("month").value;
let week=document.getElementById("week").value;
let today=document.getElementById("today").checked;
let startDate=document.getElementById("startDate").value;
let endDate=document.getElementById("endDate").value;

let base=data.filter(d=>new Date(d.date).getFullYear()===year);

if(today){
let now=new Date().toISOString().split("T")[0];
filtered=data.filter(d=>d.date===now);
render();
return;
}

if(startDate || endDate){

base=data;

if(startDate && endDate){
base=base.filter(d=>d.date>=startDate && d.date<=endDate);
}
else if(startDate){
base=base.filter(d=>d.date===startDate);
}

filtered=base;
render();
return;
}

if(month!==""){
base=base.filter(d=>new Date(d.date).getMonth()==month);
}

if(week!=="" && month!==""){
base=base.filter(d=>{
let w=Math.ceil(new Date(d.date).getDate()/7);
return w==week;
});
}

filtered=base;
render();
}

function render(){

let t=document.getElementById("table");
t.innerHTML="";

let total=0,qty=0,map={};

filtered.forEach(d=>{
d.items.forEach(i=>{
t.innerHTML+=`
<tr>
<td>${d.date}</td>
<td>${d.order}</td>
<td>${i.n}</td>
<td>${i.q}</td>
<td>RM ${d.total}</td>
<td>${d.payment}</td>
</tr>`;
qty+=i.q;
map[i.n]=(map[i.n]||0)+i.q;
});
total+=d.total;
});

let top="-",m=0;
for(let k in map){
if(map[k]>m){m=map[k];top=k;}
}

document.getElementById("o").innerText=filtered.length;
document.getElementById("r").innerText="RM "+total;
document.getElementById("q").innerText=qty;
document.getElementById("t").innerText=top;

document.getElementById("stats").style.display="flex";
document.getElementById("tableBox").style.display="block";
}

function downloadPDF(){

const { jsPDF } = window.jspdf;
let doc = new jsPDF();

doc.text("BLOOMCART POS REPORT", 10, 10);

let y=20;

filtered.forEach(d=>{
d.items.forEach(i=>{
doc.text(`${d.date} | ${d.order} | ${i.n} | Qty:${i.q} | RM${d.total} | ${d.payment}`,10,y);
y+=10;
});
});

doc.save("report.pdf");
}

function resetFilters(){

document.getElementById("year").value = "2026";
document.getElementById("month").value = "";
document.getElementById("week").value = "";

document.getElementById("startDate").value = "";
document.getElementById("endDate").value = "";

document.getElementById("today").checked = false;

document.getElementById("year").disabled = false;
document.getElementById("month").disabled = false;
document.getElementById("week").disabled = true;
document.getElementById("startDate").disabled = false;
document.getElementById("endDate").disabled = false;

document.getElementById("stats").style.display = "none";
document.getElementById("tableBox").style.display = "none";

filtered = [];
document.getElementById("table").innerHTML = "";
}

</script>

</body>
</html>
