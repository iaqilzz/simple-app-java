<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff | BLOOMCART POS SYSTEM</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        body {
            background-color: #f4f8f2;
            font-family: Arial, sans-serif;
        }

        .navbar {
            background: linear-gradient(to right, #2e7d32, #4caf50);
        }

        .main-container {
            margin-top: 20px;
        }

        .page-section,
        .content-card,
        .search-panel {
            background-color: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: none;
        }

        .page-title {
            color: #2e7d32;
            font-weight: bold;
        }

        .page-subtitle {
            color: #555;
        }

        .search-box {
            border-radius: 30px;
            padding: 10px 20px;
            border: 2px solid #4caf50;
        }

        .btn-green {
            background-color: #2e7d32;
            color: white;
            border: none;
            border-radius: 8px;
        }

        .btn-green:hover {
            background-color: #1b5e20;
            color: white;
        }

        .btn-update {
            background-color: #8d6e63;
            border: none;
            color: white;
            border-radius: 8px;
        }

        .btn-update:hover {
            background-color: #6d4c41;
            color: white;
        }

        .table {
            margin-bottom: 0;
        }

        .table thead th {
            background-color: #e8f5e9;
            color: #2e7d32;
            white-space: nowrap;
        }

        .table tbody tr:hover {
            background-color: #f9fff7;
        }

        .table td,
        .table th {
            vertical-align: middle;
        }

        .table-footer {
            background-color: #f1f8e9;
            border-top: 1px solid #ddd;
            border-radius: 0 0 15px 15px;
        }

        .pagination .page-link {
            color: #2e7d32;
        }

        .pagination .page-item.active .page-link {
            background-color: #2e7d32;
            border-color: #2e7d32;
            color: white;
        }

        .modal-content {
            border: none;
            border-radius: 15px;
            overflow: hidden;
        }

        .modal-header {
            background: linear-gradient(to right, #2e7d32, #4caf50);
            color: white;
        }

        .modal-header .btn-close {
            filter: invert(1);
        }

        .form-label {
            font-weight: bold;
            color: #2e7d32;
        }

        .form-control {
            border-radius: 8px;
        }

        .no-records-row td {
            color: #555;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow">
        <div class="container-fluid">
            <span class="navbar-brand fw-bold">
                <i class="fa-solid fa-leaf"></i>
                BLOOMCART POS SYSTEM
            </span>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="navbarMenu"></ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid main-container px-3 px-lg-4">
        <div class="page-section">
            <div class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3 mb-4">
                <div>
                    <h2 class="page-title mb-2">
                        <i class="fa-solid fa-user-tie"></i>
                        Staff
                    </h2>
                    <p class="page-subtitle mb-0">Manage staff login records</p>
                </div>

                <button class="btn btn-green" type="button" data-bs-toggle="modal" data-bs-target="#addStaffModal">
                    <i class="fa-solid fa-user-plus"></i>
                    Add Staff
                </button>
            </div>

            <div class="search-panel mb-4">
                <div class="row g-3 align-items-end">
                    <div class="col-lg-9">
                        <label for="staffSearchInput" class="form-label">Search Staff</label>
                        <input type="text" class="form-control search-box" id="staffSearchInput" placeholder="Search by username or staff name" onkeyup="searchStaff()">
                    </div>
                    <div class="col-lg-3">
                        <button class="btn btn-green w-100" type="button" id="staffSearchButton" onclick="searchStaff()">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            Search
                        </button>
                    </div>
                </div>
            </div>

            <div class="card content-card p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>No.</th>
                                <th>Username</th>
                                <th>Staff Name</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="staffTableBody">
                            <tr class="no-records-row" id="staffNoRecords">
                                <td colspan="4" class="text-center py-4">No staff records found.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="table-footer d-flex flex-column flex-md-row align-items-center justify-content-between gap-3 p-3">
                    <span class="small text-muted" id="staffPaginationInfo">Showing staff records</span>
                    <nav aria-label="Staff table pagination">
                        <ul class="pagination mb-0" id="staffPagination">
                            <li class="page-item disabled">
                                <a class="page-link" href="#" aria-label="Previous page">&laquo;</a>
                            </li>
                            <li class="page-item active" aria-current="page">
                                <a class="page-link" href="#">1</a>
                            </li>
                            <li class="page-item disabled">
                                <a class="page-link" href="#" aria-label="Next page">&raquo;</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>

   
    <div class="modal fade" id="addStaffModal" tabindex="-1" aria-labelledby="addStaffModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title fs-5" id="addStaffModalLabel">
                        <i class="fa-solid fa-user-plus"></i>
                        Add Staff
                    </h2>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body">
                    <form id="addStaffForm" action="#" method="post" onsubmit="createStaff(event)">
                        <div class="mb-3">
                            <label for="staffUsername" class="form-label">Username</label>
                            <input type="text" class="form-control" id="staffUsername" placeholder="Enter username" required>
                        </div>

                        <div class="mb-3">
                            <label for="staffName" class="form-label">Staff Name</label>
                            <input type="text" class="form-control" id="staffName" placeholder="Enter staff name" required>
                        </div>

                        <div>
                            <label for="staffPassword" class="form-label">Password</label>
                            <input type="password" class="form-control" id="staffPassword" placeholder="Enter password" required>
                        </div>
                    </form>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-green" form="addStaffForm">
                        Save Staff
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="updateStaffModal" tabindex="-1" aria-labelledby="updateStaffModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title fs-5" id="updateStaffModalLabel">
                        <i class="fa-solid fa-user-pen"></i>
                        Update Staff
                    </h2>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body">
                    <form id="updateStaffForm" action="#" method="post" onsubmit="updateStaff(event)">
                        <input type="hidden" id="updateStaffIndex">

                        <div class="mb-3">
                            <label for="updateStaffUsername" class="form-label">Username</label>
                            <input type="text" class="form-control" id="updateStaffUsername" placeholder="Enter username" required>
                        </div>

                        <div class="mb-3">
                            <label for="updateStaffName" class="form-label">Staff Name</label>
                            <input type="text" class="form-control" id="updateStaffName" placeholder="Enter staff name" required>
                        </div>

                        <div>
                            <label for="updateStaffPassword" class="form-label">Password</label>
                            <input type="password" class="form-control" id="updateStaffPassword" placeholder="Enter password" required>
                        </div>
                    </form>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-green" form="updateStaffForm">
                        Update Staff
                    </button>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const role = localStorage.getItem('userRole');
        const navbarMenu = document.getElementById('navbarMenu');

        const dummyStaffList = [
            {
                username: 'staff01',
                name: 'Aisyah Rahman',
                password: 'staff123'
            },
            {
                username: 'staff02',
                name: 'Daniel Tan',
                password: 'garden456'
            },
            {
                username: 'staff03',
                name: 'Nurul Iman',
                password: 'bloom789'
            }
        ];

if (role === "owner") {

    navbarMenu.innerHTML = `
        <li class="nav-item">
            <a class="nav-link" href="product.html">Product</a>
        </li>

        <li class="nav-item">
            <a class="nav-link" href="sale.html">Sale</a>
        </li>

        <li class="nav-item">
            <a class="nav-link" href="customer.html">Customer</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="create-staff.html">
                Staff
            </a>
        </li>

        <li class="nav-item">
            <a class="nav-link" href="report.html">Report</a>
        </li>

        <li class="nav-item">
            <a class="nav-link text-warning" href="index.html">
                Logout
            </a>
        </li>
    `;
}

else if (role === "staff") {

    navbarMenu.innerHTML = `
        <li class="nav-item">
            <a class="nav-link active" href="sale.html">Sale</a>
        </li>

        <li class="nav-item">
            <a class="nav-link" href="customer.html">Customer</a>
        </li>

        <li class="nav-item">
            <a class="nav-link text-warning" href="index.html">Logout</a>
        </li>
    `;
}

else {

    window.location.href = "index.html";
}

        function initializeDummyStaff() {
            const savedStaffList = JSON.parse(localStorage.getItem('staffList'));

            if (!savedStaffList || savedStaffList.length === 0) {
                localStorage.setItem('staffList', JSON.stringify(dummyStaffList));
            }
        }

        function getStaffList() {
            const staffList = JSON.parse(localStorage.getItem('staffList')) || [];

            return staffList.map(staff => ({
                ...staff,
                username: staff.username || staff.id || '',
                name: staff.name || staff.staffName || '',
                password: staff.password || ''
            }));
        }

        function saveStaffList(staffList) {
            localStorage.setItem('staffList', JSON.stringify(staffList));
        }

        function renderStaffTable() {
            const staffList = getStaffList();
            const staffTableBody = document.getElementById('staffTableBody');
            const staffPaginationInfo = document.getElementById('staffPaginationInfo');

            staffTableBody.innerHTML = '';

            if (staffList.length === 0) {
                staffTableBody.innerHTML = `
                    <tr class="no-records-row" id="staffNoRecords">
                        <td colspan="4" class="text-center py-4">No staff records found.</td>
                    </tr>
                `;
                staffPaginationInfo.innerText = 'Showing 0 staff records';
                return;
            }

            staffList.forEach((staff, index) => {
                staffTableBody.innerHTML += `
                    <tr class="staff-row">
                        <td>${index + 1}</td>
                        <td class="fw-semibold">${staff.username || '-'}</td>
                        <td>${staff.name || '-'}</td>
                        <td>
                            <div class="d-flex flex-column flex-sm-row gap-2">
                                <button class="btn btn-sm btn-update" type="button" onclick="openUpdateStaffModal(${index})">
                                    <i class="fa-solid fa-user-pen"></i>
                                    Update
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });

            staffPaginationInfo.innerText = `Showing ${staffList.length} staff record${staffList.length === 1 ? '' : 's'}`;
        }

        function createStaff(event) {
            event.preventDefault();

            const username = document.getElementById('staffUsername').value.trim();
            const staffName = document.getElementById('staffName').value.trim();
            const password = document.getElementById('staffPassword').value.trim();
            const staffList = getStaffList();

            if (username === '' || staffName === '' || password === '') {
                alert('Please enter Username, Staff Name, and Password.');
                return;
            }

            const isDuplicate = staffList.some(staff => staff.username.toLowerCase() === username.toLowerCase());

            if (isDuplicate) {
                alert('This Username already exists.');
                return;
            }

            staffList.push({
                username: username,
                name: staffName,
                password: password
            });

            saveStaffList(staffList);
            renderStaffTable();
            searchStaff();

            document.getElementById('addStaffForm').reset();

            const addStaffModal = bootstrap.Modal.getInstance(document.getElementById('addStaffModal'));
            addStaffModal.hide();

            alert('New staff created successfully!');
        }

        function openUpdateStaffModal(index) {
            const staffList = getStaffList();
            const staff = staffList[index];

            document.getElementById('updateStaffIndex').value = index;
            document.getElementById('updateStaffUsername').value = staff.username;
            document.getElementById('updateStaffName').value = staff.name;
            document.getElementById('updateStaffPassword').value = staff.password;

            const updateStaffModal = new bootstrap.Modal(document.getElementById('updateStaffModal'));
            updateStaffModal.show();
        }

        function updateStaff(event) {
            event.preventDefault();

            const index = parseInt(document.getElementById('updateStaffIndex').value);
            const username = document.getElementById('updateStaffUsername').value.trim();
            const staffName = document.getElementById('updateStaffName').value.trim();
            const password = document.getElementById('updateStaffPassword').value.trim();
            const staffList = getStaffList();

            if (username === '' || staffName === '' || password === '') {
                alert('Please enter Username, Staff Name, and Password.');
                return;
            }

            const isDuplicate = staffList.some((staff, staffIndex) => {
                return staffIndex !== index && staff.username.toLowerCase() === username.toLowerCase();
            });

            if (isDuplicate) {
                alert('This Username already exists.');
                return;
            }

            staffList[index] = {
                username: username,
                name: staffName,
                password: password
            };

            saveStaffList(staffList);
            renderStaffTable();
            searchStaff();

            const updateStaffModal = bootstrap.Modal.getInstance(document.getElementById('updateStaffModal'));
            updateStaffModal.hide();

            alert('Staff updated successfully!');
        }

        function searchStaff() {
            const input = document.getElementById('staffSearchInput').value.toLowerCase();
            const rows = document.getElementsByClassName('staff-row');
            let visibleCount = 0;

            for (let i = 0; i < rows.length; i++) {
                const rowText = rows[i].innerText.toLowerCase();

                if (rowText.includes(input)) {
                    rows[i].style.display = '';
                    visibleCount++;
                } else {
                    rows[i].style.display = 'none';
                }
            }

            const oldNoRecords = document.getElementById('staffNoRecords');
            if (oldNoRecords) {
                oldNoRecords.remove();
            }

            if (visibleCount === 0) {
                document.getElementById('staffTableBody').innerHTML += `
                    <tr class="no-records-row" id="staffNoRecords">
                        <td colspan="4" class="text-center py-4">No staff records found.</td>
                    </tr>
                `;
            }
        }

        initializeDummyStaff();
        renderStaffTable();    </script>

</body>
</html>
