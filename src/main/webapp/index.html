<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bemban Nursery POS Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #CDEAC0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .login-card {
            width: 450px;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .login-header {
            background: #4F7942;
            color: white;
            text-align: center;
            padding: 25px;
        }

        .login-body {
            background: white;
            padding: 35px;
        }

        .form-control {
            height: 50px;
            border-radius: 10px;
        }

        .btn-login {
            height: 50px;
            border-radius: 10px;
            font-weight: bold;
            background: #4F7942;
            border: none;
        }

        .btn-login:hover {
            background: #3e6233;
        }

        .demo-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            font-size: 14px;
            margin-top: 20px;
        }

        .owner-option {
            text-align: center;
            margin-top: 20px;
        }

        .owner-option a {
            color: #4F7942;
            text-decoration: none;
            font-weight: bold;
        }

        .owner-option a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="card login-card">

    <div class="login-header">
        <h2>🌱 Bemban Nursery</h2>
        <p class="mb-0">POS System Login</p>
    </div>

    <div class="login-body">

        <form onsubmit="loginUser(event)">

            <div class="mb-3">
                <label>User ID</label>
                <input type="text" class="form-control" id="userId" placeholder="Enter User ID" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" class="form-control" id="password" placeholder="Enter Password" required>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-login">
                    Login
                </button>
            </div>

        </form>

        <div class="demo-box">
            <strong>Demo Accounts</strong><br><br>

            <strong>Staff</strong><br>
            ID: staff01<br>
            Password: 1234<br><br>

            <strong>Owner</strong><br>
            ID: owner01<br>
            Password: owner123
        </div>       
    </div>
</div>

<script>
function loginUser(event) {
    event.preventDefault();

    const userId = document.getElementById("userId").value;
    const password = document.getElementById("password").value;

    if (userId === "owner01" && password === "owner123") {

        localStorage.setItem("userRole", "owner");

        window.location.href = "sale.html";
    }

    else if (userId === "staff01" && password === "1234") {

        localStorage.setItem("userRole", "staff");

        window.location.href = "sale.html";
    }

    else {
        alert("Invalid login credentials!");
    }
}
</script>
</body>
</html>
